services:
  db:
    image: postgres:15-alpine
    container_name: a6_stern_db
    environment:
      POSTGRES_DB: ${DB_NAME:-a6_stern}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:8.16
    container_name: a6_stern_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@local.test}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - db
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  backend:
    build:
      context: ../backend
    container_name: a6_stern_api
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-a6_stern}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-change_me}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_API_PORT: ${MINIO_API_PORT}
      MINIO_CONSOLE_PORT: ${MINIO_CONSOLE_PORT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      HYPERBOLIC_API_KEY: ${HYPERBOLIC_API_KEY}
      FRONTEND_URL: http://localhost
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      # Comma-separated browser origins if the UI is not under FRONTEND_URL (e.g. http://192.168.x.x:3003). No space after :- in shell defaults.
      CORS_EXTRA_ORIGINS: ${CORS_EXTRA_ORIGINS:-}
      LEGACY_FRONTEND_PUBLIC_DIR: ${LEGACY_FRONTEND_PUBLIC_DIR:-/legacy-frontend-public}
      DEBUG: ${DEBUG:-false}
    ports:
      - "3002:3001"
    volumes:
      - ../frontend/public:/legacy-frontend-public:ro
    depends_on:
      - db

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: a6_stern_frontend
    ports:
      - "3003:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  pgadmin_data:
