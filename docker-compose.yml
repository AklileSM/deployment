services:
  db:
    image: postgres:15-alpine
    container_name: a6_stern_db
    environment:
      POSTGRES_DB: ${DB_NAME:-a6_stern}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    # Pin a tag from https://hub.docker.com/r/dpage/pgadmin4/tags — avoid non-existent versions.
    image: dpage/pgadmin4:latest
    container_name: a6_stern_pgadmin
    environment:
      # .test is rejected by pgAdmin's email validator; use a normal-looking dev address.
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - db
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  backend:
    build:
      context: ../backend
    container_name: a6_stern_api
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-a6_stern}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-change_me}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_API_PORT: ${MINIO_API_PORT}
      MINIO_CONSOLE_PORT: ${MINIO_CONSOLE_PORT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      HYPERBOLIC_API_KEY: ${HYPERBOLIC_API_KEY}
      # Minimal provider switch: point the existing OpenAI-compatible client at Ollama.
      HYPERBOLIC_API_URL: ${HYPERBOLIC_API_URL:-http://192.168.50.103:11434/v1/chat/completions}
      HYPERBOLIC_MODEL: ${HYPERBOLIC_MODEL:-qwen3-vl:8b}
      # Backend container must be able to fetch image URLs from the frontend container.
      # Using `localhost` here points to the backend container itself.
      FRONTEND_URL: http://frontend
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      # Comma-separated browser origins if the UI is not under FRONTEND_URL (e.g. http://192.168.x.x:3003). No space after :- in shell defaults.
      CORS_EXTRA_ORIGINS: ${CORS_EXTRA_ORIGINS:-}
      LEGACY_FRONTEND_PUBLIC_DIR: ${LEGACY_FRONTEND_PUBLIC_DIR:-/legacy-frontend-public}
      DEBUG: ${DEBUG:-false}
    ports:
      - "3002:3001"
    volumes:
      - ../frontend/public:/legacy-frontend-public:ro
    depends_on:
      - db

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: a6_stern_frontend
    ports:
      - "3003:80"
    depends_on:
      - backend

# Stable names (not tied to compose project folder). Fresh clones start here.
# If your real data is in older volumes named deployment_postgres_data /
# deployment_pgadmin_data, use the legacy override file when you compose up.
volumes:
  postgres_data:
    name: a6_stern_postgres_data
  pgadmin_data:
    name: a6_stern_pgadmin_data
